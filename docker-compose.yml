services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - PORT=4000
      - DATA_DIR=/data
      - REGION_ID=${REGION_ID:-metroville}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
      - TRAFFIC_API_KEY=${TRAFFIC_API_KEY:-}
    volumes:
      - traffic-data:/data
    expose:
      - "4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  traffic-data:
